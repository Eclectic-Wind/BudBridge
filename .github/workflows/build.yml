name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build-apk:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build release APK
        working-directory: android
        run: gradle assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BudBridge-apk
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

  build-exe:
    name: Windows EXE
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: pc
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        working-directory: pc
        run: python build.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: BudBridge-exe
          path: pc/dist/BudBridge.exe
          retention-days: 30

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-apk, build-exe]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: BudBridge-apk

      - name: Download EXE
        uses: actions/download-artifact@v4
        with:
          name: BudBridge-exe

      - name: Rename artifacts
        run: |
          mv app-release-unsigned.apk BudBridge-${{ github.ref_name }}.apk
          mv BudBridge.exe BudBridge-${{ github.ref_name }}.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: BudBridge ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            BudBridge-${{ github.ref_name }}.apk
            BudBridge-${{ github.ref_name }}.exe
